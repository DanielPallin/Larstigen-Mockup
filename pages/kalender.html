<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lärstigen - Omsorgsschema</title>
    
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/kalender.css" />
  </head>

  <body>
    <header>
      <img src="/assets/favicon.PNG" alt="Logo" class="logo-small" />
      <h1>Lärstigen</h1>
    </header>

    <div class="container">
      
      <div class="card full-width sick-leave-container">
        <h3 class="card-title">Akut Frånvaro</h3>
        <p>Är Alice sjuk idag? Anmäl här så nollställs tiderna direkt för pedagoger och kök.</p>
        <button class="btn btn-danger" id="btn-sick-today">🤒 Anmäl Sjuk (Idag)</button>
      </div>

      <div class="card full-width">
        <div class="week-header">
          <button class="btn btn-small">◀</button>
          <h3 class="card-title week-title">Vecka 42</h3>
          <button class="btn btn-small">▶</button>
        </div>
        
        <p class="subtitle active-template-text">
          Aktiv mall: <strong>Standard Arbetsvecka</strong>
        </p>

        <div class="schedule-grid" id="schedule-grid">
          <div class="day-row">
            <span class="day-name">Mån</span>
            <div class="time-inputs">
              <input type="time" value="08:00" /> - <input type="time" value="16:00" />
            </div>
          </div>
          <div class="day-row">
            <span class="day-name">Tis</span>
            <div class="time-inputs">
              <input type="time" value="08:00" /> - <input type="time" value="16:00" />
            </div>
          </div>
          <div class="day-row">
            <span class="day-name">Ons</span>
            <div class="time-inputs">
              <input type="time" value="08:00" /> - <input type="time" value="15:00" />
            </div>
          </div>
          <div class="day-row">
            <span class="day-name">Tor</span>
            <div class="time-inputs">
              <input type="time" value="08:00" /> - <input type="time" value="16:00" />
            </div>
          </div>
          <div class="day-row">
            <span class="day-name">Fre</span>
            <div class="time-inputs">
              <input type="time" value="08:00" /> - <input type="time" value="14:00" />
            </div>
          </div>
        </div>
        <button class="btn save-btn">Spara Ändringar</button>
      </div>

      <div class="card full-width">
        <h3 class="card-title">🔄 Rullande Schema</h3>
        <p>Applicera ett standardschema över en längre period.</p>
        <button class="btn btn-small btn-accent">
          + Skapa ny mall (t.ex. Mamma-vecka)
        </button>
      </div>

    </div>

    <nav class="bottom-nav">
      <a href="index.html" class="nav-item">🏠</a>
      <a href="kalender.html" class="nav-item active-nav">📅</a>
      <a href="barnprofil.html" class="nav-item">ℹ️</a>
      <a href="dagbok.html" class="nav-item">📖</a>
      <a href="meddelanden.html" class="nav-item">😊</a>
    </nav>
  </body>
</html>
