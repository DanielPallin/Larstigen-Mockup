<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lärstigen - Omsorgsschema</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/kalender.css" />
  <script type="module" src="../ts/kalender.ts"></script>

</head>
<body>
    <header class="site-header">
      <div class="header-inner">
        <img src="../assets/L-logo.png" alt="Lärstigen logotyp" class="logo-small" />
      </div>
    </header>

  <div class="container">
    
    <div class="view-controls full-width">
      <button class="view-btn" data-target="view-create">Skapa Schema</button>
      <button class="view-btn active" data-target="view-schema">Schema</button>
      <button class="view-btn" data-target="view-overview">Översikt</button>
    </div>

    <div id="view-create" class="view-section active-view full-width" style="display: none;">
      
      <div class="card full-width">
        <h3 class="card-title">📋 Mina Mallar</h3>
        <p class="subtitle" style="margin-bottom: 15px;">Dina sparade rullande scheman.</p>
        
        <div id="template-list"></div>

        <div style="display: flex; align-items: center; gap: 10px; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border-light);">
          <input type="checkbox" id="apply-all-children" style="width: 20px; height: 20px; accent-color: var(--primary-green);">
          <label for="apply-all-children" style="font-weight: bold; color: var(--text-dark);">Tillämpa mall till alla mina barn</label>
        </div>

        <button class="btn btn-small btn-accent" style="margin-top: 15px;">
          + Skapa ny mall
        </button>
      </div>

      </div>

    <div id="view-schema" class="view-section full-width">
      <div class="card full-width">
        <h3 class="card-title" style="text-align: center;">Bekräftat Schema kommer här</h3>
      </div>
    </div>

    <div id="view-overview" class="view-section full-width" style="display: none;">
      <div class="card full-width">
        <div class="week-header">
          <button class="btn btn-small" id="btn-prev-month">◀</button>
          <h3 class="card-title week-title" id="month-title-display">April 2026</h3>
          <button class="btn btn-small" id="btn-next-month">▶</button>
        </div>
        
        <div class="month-grid" id="month-grid">
          <div class="month-day-header">M</div>
          <div class="month-day-header">T</div>
          <div class="month-day-header">O</div>
          <div class="month-day-header">T</div>
          <div class="month-day-header">F</div>
          <div class="month-day-header">L</div>
          <div class="month-day-header">S</div>
          
         </div>
      </div>
    </div>

  </div>

<!-- >>>>>>> main -->
    <nav class="bottom-nav">
      <a href="dashboard.html" class="nav-item">
        <span class="nav-icon" data-icon="home" aria-hidden="true"></span>
        <span class="sr-only">Dashboard</span>
      </a>

      <a href="kalender.html" class="nav-item">
        <span class="nav-icon" data-icon="calendar" aria-hidden="true"></span>
        <span class="sr-only">Kalender</span>
      </a>

      <a href="information.html" class="nav-item">
        <span class="nav-icon" data-icon="alert-circle" aria-hidden="true"></span>
        <span class="sr-only">Information</span>
      </a>

      <a href="loggbok.html" class="nav-item">
        <span class="nav-icon" data-icon="book-open" aria-hidden="true"></span>
        <span class="sr-only">Loggbok</span>
      </a>

      <a href="profil.html" class="nav-item">
        <span class="nav-icon" data-icon="smile" aria-hidden="true"></span>
        <span class="sr-only">Profil</span>
      </a>
    </nav>
</body>
</html>
