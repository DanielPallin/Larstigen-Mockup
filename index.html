<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lärstigen - Logga in</title>
    
    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/components.css" />
    
    <script type="module" src="/ts/login.ts"></script>

    <style>
      .login-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .login-header {
        text-align: center;
        margin-bottom: 30px;
      }

      .login-logo {
        width: 100px;
        margin-bottom: 10px;
      }

      .tab-container {
        display: flex;
        margin-bottom: 20px;
        border-bottom: 2px solid var(--border-light);
      }

      .tab {
        flex: 1;
        text-align: center;
        padding: 10px;
        font-family: var(--font-header);
        font-size: 1.2rem;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--text-muted);
      }

      .tab.active {
        color: var(--primary-green);
        border-bottom: 3px solid var(--primary-green);
      }

      .form-section {
        display: none;
      }

      .form-section.active {
        display: block;
      }

      .input-field {
        padding: 12px;
        border: 1px solid var(--border-light);
        border-radius: 8px;
        width: 100%;
        margin-bottom: 15px;
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 20px 0;
        color: var(--text-muted);
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        border-bottom: 1px solid var(--border-light);
      }

      .divider span {
        padding: 0 10px;
        font-size: 0.9rem;
      }

      .btn-social {
        background: var(--white);
        color: var(--text-dark);
        border: 1px solid var(--border-light);
        text-transform: none;
        font-family: var(--font-body);
        font-weight: 600;
        margin-top: 10px;
      }

      .btn-bankid {
        background: #1f4f7a;
        color: white;
      }

      .btn-apple {
        background: #000;
        color: white;
      }

      .btn-google {
        background: var(--white);
        color: var(--text-dark);
      }
    </style>
  </head>

  <body>
    <div class="login-container container full-width">
      
      <div class="login-header full-width">
        <img src="assets/favicon.PNG" alt="Lärstigen Logo" class="login-logo" />
        <h1 style="color: var(--primary-green);">Lärstigen</h1>
      </div>

      <div class="card full-width">
        
        <div class="tab-container">
          <div class="tab active" id="tab-parent" onclick="switchTab('parent')">Vårdnadshavare</div>
          <div class="tab" id="tab-staff" onclick="switchTab('staff')">Personal</div>
        </div>

        <!-- PARENT -->
        <div id="view-parent" class="form-section active">
          <h3 class="card-title">Logga in</h3>
          <p class="subtitle" style="margin-bottom: 20px;">
            Logga in med din e-post för att se ditt barns dag.
          </p>
          
          <form id="parent-login-form">
            <input type="email" class="input-field" placeholder="E-postadress" required />
            <input type="password" class="input-field" placeholder="Lösenord" required />
            <button type="submit" class="btn">Logga in</button>
          </form>

          <div class="divider"><span>eller</span></div>

          <button class="btn btn-social btn-bankid">
            Logga in med Mobilt BankID
          </button>

          <button class="btn btn-social btn-google">
            Logga in med Google
          </button>

          <button class="btn btn-social btn-apple">
            Logga in med Apple
          </button>
        </div>

        <!-- STAFF -->
        <div id="view-staff" class="form-section">
          <h3 class="card-title">Personalinloggning</h3>
          <p class="subtitle" style="margin-bottom: 15px;">
            Logga in med din e-post för att administrera avdelningen.
          </p>
          
          <form id="login-form">
            <input type="email" class="input-field" placeholder="E-postadress" required />
            <input type="password" class="input-field" placeholder="Lösenord" required />
            <button type="submit" class="btn">Logga in</button>
          </form>
        </div>

      </div>
    </div>

    <script>
      function switchTab(role) {
        document.getElementById('tab-parent').classList.remove('active');
        document.getElementById('tab-staff').classList.remove('active');
        document.getElementById('view-parent').classList.remove('active');
        document.getElementById('view-staff').classList.remove('active');

        document.getElementById('tab-' + role).classList.add('active');
        document.getElementById('view-' + role).classList.add('active');
      }
    </script>
  </body>
</html>
